defaults:
  - finetune_base

name: "${base_name} - finetune head&backbone diff"
multivariate_tpe: true
key_metric: "CohenKappa"
tuning_params:
  floats:
    head_lr:
      log: True
      low: 1.0e-6
      high: 1.0e-2
    backbone_lr:
      log: True
      low: 1.0e-7
      high: 1.0e-3
  ints: {}
  categoricals:
    # Tuning for global stability
    loss_config.gamma: [1.0, 1.5, 2.0, 3.0]
    dirichlet_config.alpha: [0.01,0.1,0.5,1.0,2.0, 3.0, 5.0]
    dirichlet_config.tau: [0.5,1.0,2.0,5.0,10.0]
    freeze_backbone_epoch: [0, 2, 5, 8, 15]
    
train_config:
  dataloader_num_workers: 0
  prefetch_factor: 2
  optimizer: "AdamW"
  head_lr: 1e-2
  backbone_lr: 1e-5
  batch_size: 128
  epochs: 200
  patience: 20
  stop_early: True
  loss_config:
    name: "FCL"           # focal
    gamma: 2.0
    alpha: false 
  # --- Dirichlet prior augmentation ---
  dirichlet_config:
    enabled: true
    alpha: 0.7
    tau: 1.0
    blend_with_uniform: false
    beta: 0.8  